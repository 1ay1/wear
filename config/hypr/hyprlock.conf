# PHOSPHOR — green terminal-core hyprlock
# "SYSTEM LOCKED — AUTHENTICATE TO PROCEED"

general {
    hide_cursor = true
    grace = 2
}

background {
    monitor =
    color = rgba(050805ff)
    path = screenshot
    blur_passes = 3
    blur_size = 8
    contrast = 1.1
    brightness = 0.25
    vibrancy = 0.3
}

# Big clock — 24h, monospace, phosphor green
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M:%S')"
    color = rgba(00ff41ff)
    font_size = 110
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 80
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(00ff4166)
}

# ISO date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%Y-%m-%dT%H:%M %Z')"
    color = rgba(4a7a5aff)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -40
    halign = center
    valign = center
}

# Lock banner
label {
    monitor =
    text = ── SYSTEM LOCKED ── AUTHENTICATE TO PROCEED ──
    color = rgba(00e5ffcc)
    font_size = 14
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -90
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 340, 50
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(00ff41ff)
    inner_color = rgba(050805e6)
    font_color = rgba(00ff41ff)
    fade_on_empty = false
    placeholder_text = <span foreground="##4a7a5a">root@garuda:~# passwd_</span>
    hide_input = false
    rounding = 0
    check_color = rgba(00e5ffff)
    fail_color = rgba(ff2b4aff)
    fail_text = <span foreground="##ff2b4a">ACCESS DENIED — attempt $ATTEMPTS logged</span>
    position = 0, -180
    halign = center
    valign = center
}

# User readout
label {
    monitor =
    text = cmd[update:60000] echo "uid=$(id -u) $USER@$(uname -n) • $(uname -r | cut -d- -f1)-zen"
    color = rgba(4a7a5aff)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, -125
    halign = center
    valign = center
}

# Uptime footer
label {
    monitor =
    text = cmd[update:60000] awk '{s=int($1); printf "uptime %dd %02dh %02dm — session integrity nominal", s/86400, (s%86400)/3600, (s%3600)/60}' /proc/uptime
    color = rgba(103c22ff)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = bottom
}
