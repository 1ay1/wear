#  ┌─────────────────────────────────────────────────────────────┐
#  │  Hyprland — PHOSPHOR // green terminal-core  •  NVIDIA        │
#  │  root@garuda:~# theme --matrix --no-mercy                     │
#  └─────────────────────────────────────────────────────────────┘

################
### MONITORS ###
################
monitor = , preferred, auto, 1

###################
### AUTOSTART   ###
###################
exec-once = neowall
exec-once = waybar
exec-once = dunst
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hyprctl setcursor Bibata-Modern-Amber 24

#####################
### ENV / NVIDIA  ###
#####################
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Amber
env = HYPRCURSOR_SIZE,24

# NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Wayland toolkit hints
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
# KDE apps (Dolphin) need this to find /etc/xdg/menus/arch-applications.menu;
# without it the service cache is empty -> "Open with" shows no applications
env = XDG_MENU_PREFIX,arch-
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = USE_WAYLAND_GRIM,1

cursor {
    no_hardware_cursors = true
}

#####################
### LOOK & FEEL   ###
#####################
general {
    gaps_in = 6
    gaps_out = 14
    border_size = 2
    col.active_border = rgba(00ff41ee) rgba(00e5ffee) rgba(00ff41ee) 45deg
    col.inactive_border = rgba(0d2818aa) rgba(103c22aa) 45deg
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0

    active_opacity = 1.0
    inactive_opacity = 0.94

    # Gently dim unfocused windows so the active one pops
    dim_inactive = true
    dim_strength = 0.08
    dim_special = 0.3

    shadow {
        enabled = true
        range = 20
        render_power = 4
        offset = 0 0
        color = rgba(00ff4155)
        color_inactive = rgba(00000066)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = false
        ignore_opacity = true
        vibrancy = 0.25
        popups = true
        special = true
        brightness = 0.95
        contrast = 1.05
    }
}

animations {
    enabled = true
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1

    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner, loop
    animation = fade, 1, 10, smoothIn
    animation = fadeDim, 1, 10, smoothIn
    animation = layersIn, 1, 4, winIn, slide
    animation = layersOut, 1, 4, smoothIn, slide
    animation = fadeLayers, 1, 8, smoothIn
    animation = workspaces, 1, 5, overshot, slidevert
    animation = specialWorkspace, 1, 5, overshot, slidefadevert 20%
}

dwindle {
    # pseudotile option removed in Hyprland 0.55 (the `pseudo` dispatcher still works)
    preserve_split = true
    # On ultrawide: 1st split side-by-side (3440/1440 > 1.4), but a half
    # (1720x1440, ratio 1.19 < 1.4) splits top/bottom -> 3rd window stacks vertically
    split_width_multiplier = 1.4
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

#############
### INPUT ###
#############
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        disable_while_typing = true
    }
}

# gestures:workspace_swipe replaced by the `gesture` keyword in Hyprland 0.55
gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER
$term = kitty
$menu = rofi -show combi
$files = dolphin

bind = $mainMod, Return, exec, $term
# Fallback terminal binds (redundancy so you're never stranded)
bind = $mainMod SHIFT, Return, exec, alacritty
bind = CTRL ALT, T, exec, $term
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod CTRL SHIFT, Q, forcekillactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $files
bind = $mainMod, V, togglefloating,
bind = $mainMod SHIFT, Space, togglefloating,
bind = $mainMod, Space, exec, $menu
bind = $mainMod, D, exec, $menu
bind = $mainMod, X, exec, rofi -show kill
bind = $mainMod, N, exec, rofi -show ssh
bind = $mainMod, Tab, exec, rofi -show window
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, E, exec, wlogout -b 3 -c 8 -r 8 -L 400 -R 400

# Clipboard history + emoji-ish picker
bind = $mainMod, C, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod SHIFT, C, exec, hyprpicker -a

# Wallpaper: pick a live shader (Super+W) / skip to next (Super+Shift+W)
bind = $mainMod, W, exec, ~/.local/bin/shader-switch.sh
bind = $mainMod SHIFT, W, exec, neowall next

# Move focus (vim + arrows)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Screenshots (grim + slurp → satty annotate) ───────────────────────────
# In satty: draw arrows/boxes/text/blur, then Ctrl+C copies to clipboard AND
# saves the PNG to ~/Pictures/Screenshots. Enter also copies+saves+exits.
$scripts = ~/.config/hypr/scripts
bind = , Print,        exec, $scripts/screenshot.sh region   # drag-select region → annotate
bind = $mainMod, Print, exec, $scripts/screenshot.sh full    # full screen → annotate
bind = SHIFT, Print,   exec, $scripts/screenshot.sh window   # active window → annotate

# ── Screen recording (wf-recorder, NVENC/GPU — toggle) ─────────────────
# Press once to start (drag a region), press the SAME key again to stop.
# On stop the file lands in ~/Videos/Recordings and its path is copied.
bind = $mainMod, R,          exec, $scripts/record.sh region  # record region
bind = $mainMod SHIFT, R,    exec, $scripts/record.sh full    # record whole screen
bind = $mainMod ALT, R,      exec, $scripts/record.sh gif     # record region → GIF
bind = $mainMod CTRL, R,     exec, $scripts/record.sh audio   # record region + audio

# Media & brightness
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOW RULES / LAYERS  ###
##############################
windowrule = suppress_event maximize, match:class .*

# Floating system monitors (spawned from waybar clicks)
windowrule = float on, match:class ^(htop-float|nvtop-float)$
windowrule = size 1500 850, match:class ^(htop-float|nvtop-float)$
windowrule = center on, match:class ^(htop-float|nvtop-float)$
windowrule = opacity 0.92 0.92, match:class ^(htop-float|nvtop-float)$
windowrule = pin on, match:class ^(htop-float|nvtop-float)$

# Floating utility windows
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(thunar)$, match:title ^(File Operation Progress)$
windowrule = float on, match:class ^(org.kde.dolphin)$, match:title ^(Copying|Moving|Deleting|Progress Dialog).*
windowrule = float on, match:class ^(org.gnome.Calculator)$
windowrule = float on, match:class ^(qt5ct|qt6ct|nwg-look)$
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:class ^(polkit-gnome-authentication-agent-1)$

# Center + size common floats
windowrule = size 900 600, match:class ^(pavucontrol)$
windowrule = center on, match:class ^(pavucontrol)$
windowrule = size 1000 650, match:class ^(blueman-manager)$
windowrule = center on, match:class ^(blueman-manager)$

# Picture-in-Picture: pin + keep on top
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = keep_aspect_ratio on, match:title ^(Picture-in-Picture)$
windowrule = move 100%-w-30 100%-h-60, match:title ^(Picture-in-Picture)$
windowrule = rounding 10, match:title ^(Picture-in-Picture)$
windowrule = no_shadow on, match:title ^(Picture-in-Picture)$

# Transparency
windowrule = opacity 0.92 0.88, match:class ^(kitty)$
windowrule = opacity 0.97 0.94, match:class ^(code)$
windowrule = opacity 0.95 0.90, match:class ^(thunar)$
windowrule = opacity 0.95 0.90, match:class ^(org.kde.dolphin)$
windowrule = opacity 0.96 0.92, match:class ^(org.telegram.desktop)$

# No blur/opacity for fullscreen video & games
windowrule = opacity 1.0 1.0, match:class ^(mpv|vlc)$
windowrule = idle_inhibit fullscreen, match:class .*
windowrule = immediate on, match:class ^(steam_app_).*

# Firefox/Chrome sharing indicator — no steal focus
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# Satty annotation overlay: floating, pinned, no shadow
windowrule = float on, match:class ^(com.gabm.satty)$
windowrule = pin on, match:class ^(com.gabm.satty)$
windowrule = no_anim on, match:class ^(com.gabm.satty)$
windowrule = no_shadow on, match:class ^(com.gabm.satty)$
windowrule = center on, match:class ^(com.gabm.satty)$

layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace rofi
layerrule = blur on, match:namespace notifications
layerrule = blur on, match:namespace logout_dialog
layerrule = ignore_alpha 0, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace waybar
layerrule = animation slide, match:namespace rofi
layerrule = animation slide, match:namespace notifications
